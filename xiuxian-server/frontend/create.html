<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>创建角色 - 凡人修仙录</title>
  <link rel="stylesheet" href="css/base.css">
  <style>
    .create-screen {
      min-height: 100vh;
      min-height: 100dvh;
      padding: var(--sp-lg);
    }

    /* 步骤指示器 */
    .step-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: var(--sp-lg);
    }
    .step-dot {
      width: 1.8rem;
      height: 1.8rem;
      border-radius: 50%;
      background: var(--color-panel);
      border: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-sm);
      transition: all 0.3s;
    }
    .step-dot.active { background: var(--color-gold); color: #1a1a2e; border-color: var(--color-gold); }
    .step-dot.done   { background: var(--color-success); color: #fff; border-color: var(--color-success); }
    .step-line {
      width: 1rem;
      height: 1px;
      background: var(--color-border);
    }
    .step-line.done { background: var(--color-success); }

    /* 步骤面板 */
    .step-panel { display: none; }
    .step-panel.active { display: block; }

    /* 雷达 */
    .radar-wrap {
      display: flex;
      justify-content: center;
      margin: var(--sp-md) 0;
    }
    .radar-canvas {
      width: 60vw;
      height: 60vw;
      max-width: 230px;
      max-height: 230px;
    }
    .element-info {
      text-align: center;
      margin: var(--sp-sm) 0;
    }
    .element-main {
      color: var(--color-gold);
      font-size: var(--font-xl);
      font-weight: bold;
    }
    .multiplier {
      color: var(--color-text-dim);
      font-size: var(--font-sm);
    }

    /* 命格 */
    .talent-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-bottom: var(--sp-sm);
    }
    .talent-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-xs) var(--sp-sm);
      background: var(--color-panel);
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--q-white);
    }
    .talent-card.q-1 { border-left-color: var(--q-white); }
    .talent-card.q-2 { border-left-color: var(--q-green); }
    .talent-card.q-3 { border-left-color: var(--q-blue); }
    .talent-card.q-4 { border-left-color: var(--q-purple); }
    .talent-card.q-5 { border-left-color: var(--q-orange); }
    .talent-card.q-6 { border-left-color: var(--q-red); }
    .talent-detail { font-size: var(--font-xs); }
    .talent-value { font-size: var(--font-md); font-weight: bold; }

    .fetter-list {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-xs);
      margin-bottom: var(--sp-sm);
    }
    .fetter-tag {
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      font-size: var(--font-xs);
      background: var(--color-panel);
      border: 1px solid var(--color-gold-dim);
      color: var(--color-gold);
    }

    /* 表单 */
    .input-group input {
      width: 100%;
      padding: var(--sp-sm);
      background: var(--color-panel);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      color: var(--color-text);
      font-size: var(--font-md);
      outline: none;
    }
    .input-group input:focus { border-color: var(--color-gold); }

    .btn-row {
      display: flex;
      gap: var(--sp-sm);
      margin-top: var(--sp-md);
    }
    .btn-row .btn { flex: 1; }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="create-screen" id="app">
      <!-- 步骤 -->
      <div class="step-bar">
        <span class="step-dot active" id="stepDot1">1</span>
        <span class="step-line" id="stepLine1"></span>
        <span class="step-dot" id="stepDot2">2</span>
        <span class="step-line" id="stepLine2"></span>
        <span class="step-dot" id="stepDot3">3</span>
      </div>

      <!-- Step 1 -->
      <div class="step-panel active" id="step1Panel">
        <div class="panel">
          <div class="panel-title">道号</div>
          <div class="input-group" style="margin-bottom:var(--sp-md)">
            <input type="text" id="roleNameInput" maxlength="8" placeholder="请输入你的道号（2-8字符）">
          </div>
          <button class="btn btn-primary btn-block" id="btnNext1" disabled>踏入仙途</button>
        </div>
      </div>

      <!-- Step 2 -->
      <div class="step-panel" id="step2Panel">
        <div class="panel">
          <div class="panel-title">灵根觉醒</div>
          <div class="radar-wrap">
            <canvas class="radar-canvas" id="radarCanvas"></canvas>
          </div>
          <div class="element-info">
            <div class="element-main" id="mainElement">—</div>
            <div class="multiplier" id="multiplier">—</div>
          </div>
          <div class="btn-row">
            <button class="btn btn-ghost" id="btnReroll">重随</button>
            <button class="btn btn-primary" id="btnConfirmElement">确认灵根</button>
          </div>
        </div>
      </div>

      <!-- Step 3 -->
      <div class="step-panel" id="step3Panel">
        <div class="panel">
          <div class="panel-title">命格星盘</div>
          <div class="talent-list" id="talentList"></div>
          <div class="fetter-list" id="fetterList"></div>
          <div class="btn-row">
            <button class="btn btn-ghost" id="btnRerollTalent">重抽</button>
            <button class="btn btn-primary" id="btnConfirmTalent">确认命格</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/ui.js"></script>
  <script src="js/api.js"></script>
  <script>
    (async function () {
      UI.lockOrientation();
      if (!API.getToken()) { window.location.href = '/'; return; }

      let roleId = null;
      let elementData = null;
      let talentData = null;
      const QUALITY_NAMES = ['', '凡品', '良品', '优品', '极品', '仙品', '神品'];
      const QUALITY_CLASS = ['', 'q-1', 'q-2', 'q-3', 'q-4', 'q-5', 'q-6'];

      const $ = (id) => document.getElementById(id);

      // Steps
      function setStep(n) {
        for (let i = 1; i <= 3; i++) {
          $(`step${i}Panel`).className = 'step-panel' + (i === n ? ' active' : '');
          $(`stepDot${i}`).className = 'step-dot' + (i === n ? ' active' : i < n ? ' done' : '');
          if (i < 3) $(`stepLine${i}`).className = 'step-line' + (i < n ? ' done' : '');
        }
      }

      // Step 1
      $('roleNameInput').addEventListener('input', () => {
        $('btnNext1').disabled = $('roleNameInput').value.trim().length < 2;
      });
      $('btnNext1').addEventListener('click', async () => {
        const name = $('roleNameInput').value.trim();
        if (name.length < 2) return;
        UI.toast('创建角色中...');
        const resp = await API.createRole(name);
        if (resp.code !== 0) { UI.toast(resp.msg); return; }
        roleId = resp.data.role_id;
        setStep(2);
        rollElement();
      });

      // Step 2
      async function rollElement() {
        const resp = await API.randomElement(roleId);
        if (resp.code !== 0) { UI.toast(resp.msg); return; }
        elementData = resp.data;
        drawRadar(resp.data);
        $('mainElement').textContent = '主灵根: ' + resp.data.main_element_name;
        $('multiplier').textContent = '修炼倍率: ' + resp.data.cultivate_multiplier;
      }
      $('btnReroll').addEventListener('click', rollElement);
      $('btnConfirmElement').addEventListener('click', async () => {
        if (!elementData) return;
        const resp = await API.confirmElement(roleId, elementData);
        if (resp.code !== 0) { UI.toast(resp.msg); return; }
        UI.toast('灵根已锁定');
        setStep(3);
        rollTalent();
      });

      // Radar
      function drawRadar(data) {
        const canvas = $('radarCanvas');
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        const ctx = canvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        const w = rect.width, h = rect.height, cx = w / 2, cy = h / 2, r = Math.min(w, h) * 0.34;
        const labels = ['金', '木', '水', '火', '土'];
        const values = [data.metal, data.wood, data.water, data.fire, data.earth];
        const maxVal = 80;

        // BG
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.fillStyle = 'rgba(26,26,46,0.6)';
        for (let i = 1; i <= 4; i++) {
          ctx.beginPath();
          for (let j = 0; j < 5; j++) {
            const a = -Math.PI / 2 + (Math.PI * 2 / 5) * j;
            const x = cx + Math.cos(a) * r * (i / 4), y = cy + Math.sin(a) * r * (i / 4);
            if (j === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          }
          ctx.closePath(); ctx.stroke();
        }
        // Axes
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.beginPath();
        for (let j = 0; j < 5; j++) {
          const a = -Math.PI / 2 + (Math.PI * 2 / 5) * j;
          ctx.moveTo(cx, cy); ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
        }
        ctx.stroke();
        // Data
        ctx.fillStyle = 'rgba(212,165,74,0.25)';
        ctx.strokeStyle = '#d4a54a';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        for (let j = 0; j < 5; j++) {
          const a = -Math.PI / 2 + (Math.PI * 2 / 5) * j;
          const x = cx + Math.cos(a) * r * (values[j] / maxVal);
          const y = cy + Math.sin(a) * r * (values[j] / maxVal);
          if (j === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath(); ctx.fill(); ctx.stroke();
        // Labels
        ctx.fillStyle = '#e0d5c1';
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        for (let j = 0; j < 5; j++) {
          const a = -Math.PI / 2 + (Math.PI * 2 / 5) * j;
          ctx.fillText(labels[j], cx + Math.cos(a) * r * 1.2, cy + Math.sin(a) * r * 1.2 + 3);
        }
        ctx.fillStyle = '#d4a54a';
        ctx.font = 'bold 14px sans-serif';
        ctx.fillText(values.reduce((a, b) => a + b, 0), cx, cy + 4);
      }

      // Step 3
      async function rollTalent() {
        const resp = await API.randomTalent(roleId);
        if (resp.code !== 0) { UI.toast(resp.msg); return; }
        talentData = resp.data;
        $('talentList').innerHTML = resp.data.talents.map((t) => `
          <div class="talent-card ${QUALITY_CLASS[t.quality]}">
            <div>
              <div style="font-weight:bold;font-size:var(--font-sm)">${t.talent_name}</div>
              <div class="talent-detail text-dim">${QUALITY_NAMES[t.quality]}${t.passive ? ' · ' + t.passive : ''}</div>
            </div>
            <div class="talent-value ${QUALITY_CLASS[t.quality]}">+${t.value}</div>
          </div>`).join('');
        $('fetterList').innerHTML = resp.data.fetters.map((f) =>
          `<span class="fetter-tag">${f.category}: ${f.name} · ${f.effect}</span>`
        ).join('');
      }
      $('btnRerollTalent').addEventListener('click', rollTalent);
      $('btnConfirmTalent').addEventListener('click', async () => {
        if (!talentData) return;
        const resp = await API.confirmTalent(roleId, talentData.talents);
        if (resp.code !== 0) { UI.toast(resp.msg); return; }
        UI.toast('命格已确认！');
        setTimeout(() => { window.location.href = `/game.html?role_id=${roleId}`; }, 600);
      });
    })();
  </script>
</body>
</html>
